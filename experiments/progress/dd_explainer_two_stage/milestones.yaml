# Cross-experiment progression milestones for the dd_explainer task.
#
# Hand-curated. Each entry is one n=1000 A/B verdict copied from a PR
# description or sweep writeup. To add a new milestone, append to the
# `milestones:` list and re-render:
#
#     uv run python -m autoresearch.compare progression \
#       -m experiments/progress/dd_explainer_two_stage/milestones.yaml \
#       --out experiments/progress/dd_explainer_two_stage/v2_progression.png

title: |-
  dd_explainer two_stage — cross-experiment progression on n=1000 heldout
  PR-E prev_amount_cited slot (LMFE v2) new SOTA: mean_total 12.634 -> 14.332, pass_all_pct 19.4% -> 31.4%

primary_metric: mean_total
secondary_metric: no_halluc
threshold: -0.5
threshold_label: "-0.5 ship-as-champion"

milestones:
  - label: vanilla
    description: "Gemma 4 4B base, no fine-tune (vanilla baseline)"
    metrics:
      mean_total: 8.354
      no_halluc: -0.876
      pass_all_pct: 11.9

  - label: E18
    description: "v2 GRPO champion (single-stage, no two-stage architecture)"
    metrics:
      mean_total: 9.324
      no_halluc: -0.840
      pass_all_pct: 18.5

  - label: v0_pipeline
    description: "Two-stage v3 (bge-small + extra features) + E18 LoRA — first config to clear 10"
    metrics:
      mean_total: 10.293
      no_halluc: -0.876
      pass_all_pct: 14.4

  - label: E25
    description: "v3 + GRPO retrain on Stage-1-injected prompts (90 min sweep)"
    metrics:
      mean_total: 10.804
      no_halluc: -0.844
      pass_all_pct: 12.9

  - label: v4_mlp+E18
    description: "MLP head Stage 1 + E18 LoRA (no Stage 2 retrain) — ties E25 cheaper"
    metrics:
      mean_total: 10.816
      no_halluc: -0.848
      pass_all_pct: 22.4

  - label: v1_constrained
    description: "v4_mlp + E18 + prompt-time GROUNDING CONSTRAINT (PR #12)"
    metrics:
      mean_total: 10.961
      no_halluc: -0.732
      pass_all_pct: 23.8

  - label: v2_slot
    description: "v4_mlp + E18 + LMFE slot mask (PR-B) — flat vs PR #12"
    metrics:
      mean_total: 10.966
      no_halluc: -0.724
      pass_all_pct: 23.2

  - label: "E26 (×3.0)"
    description: "PR-C iter 1 — slot reward ×3.0 + 80 steps (over-weighted, regressed prose)"
    metrics:
      mean_total: 10.801
      no_halluc: -0.924
      pass_all_pct: 12.1

  - label: "E27 (×2.0)"
    description: "PR-C iter 2 — slot reward ×2.0 + 160 steps (new SOTA mean_total, prose recovered)"
    metrics:
      mean_total: 11.192
      no_halluc: -0.744
      pass_all_pct: 17.0

  - label: "E27 + LMFE"
    description: "PR-C E27 adapter eval'd with --constrain-facts --enforce-slots — flat with PR-B"
    metrics:
      mean_total: 10.910
      no_halluc: -0.724
      pass_all_pct: 17.4

  - label: "E27+LMFE (PR-D)"
    description: "Same E27+LMFE generations rescored under usage-aware-signflip rubric (#16) — plateau broken, 1000/1000 pass"
    metrics:
      mean_total: 12.634
      no_halluc: 1.000
      pass_all_pct: 19.4

  - label: "E27+LMFE-v2 (PR-E)"
    description: "Force-populate prev_amount_cited via LMFE required + single-enum — new SOTA, prev_amount perfect 1000/1000"
    metrics:
      mean_total: 14.332
      no_halluc: 1.000
      pass_all_pct: 31.4

  - label: "PR-E (relaxed)"
    description: "PR-E generations rescored under v2 rubric (well_formed cap relaxed 3->4 sentences + 2 inaction loopholes closed). Apples-to-apples baseline for PR-F."
    metrics:
      mean_total: 13.889
      no_halluc: 0.817
      pass_all_pct: 10.7

  - label: "PR-F v3 (ablation)"
    description: "PR-F slot force-populate (prev_amount + tariff + rate_change_pct) + v3 classifier + relaxed rubric (n=1000) — isolates slot mechanism from v4 contribution."
    metrics:
      mean_total: 13.434
      no_halluc: 1.000
      pass_all_pct: 11.7

  - label: "PR-F v4 (champion)"
    description: "PR-F slot force-populate + v4 MLP classifier + relaxed rubric (n=1000) — NEW CHAMPION (mean_total >= 13.9, no_halluc(slots) >= 0.95)."
    metrics:
      mean_total: 14.014
      no_halluc: 1.000
      pass_all_pct: 11.7

  - label: "PR-G E28 (constrain-facts)"
    description: "PR-G GRPO retrain warm-started from E27 with --constrain-facts (eval-matching VALID FACTS prompt block) + v4 MLP + LMFE slots (n=1000). New SOTA on mean_total + pass_all (more than 2x); slot-side no_halluc still perfect (1.000), but row-level no_halluc drops to 0.601 — extra prose around slots introduces unsupported claims in 39.9% of rows."
    metrics:
      mean_total: 14.396
      no_halluc: 1.000
      pass_all_pct: 25.8

  - label: "E28 + templates"
    description: "Inference-time post-processing on E28: deterministic prose templates for the 4 lonely triggers (First DD review / Missed-bounced / Manual reduction / Exemption Expiry), each citing the current tariff via 'on your tariff <Name>' to satisfy the eval rubric. Zero retrain. n=1000: mean_total 14.396 -> 14.684 (+0.288), row-level no_halluc 0.601 -> 0.879 (+0.278), pass_all 25.8% -> 44.1% (+18.3 pp, +70% relative). Slot-side no_halluc preserved at 1.000."
    metrics:
      mean_total: 14.684
      no_halluc: 1.000
      pass_all_pct: 44.1

  - label: "E28 + v5 + all"
    description: "E28 LoRA + Stage-1 v5 (3 new boolean predicate features: n_failed_payments, is_first_dd_review, max_abs_rate_change_pct -> 100% exact-match) + lonely-trigger templates + No-triggers-identified fallback template + _TARIFF_RE rubric regex accepts digit-first names. Fresh n=1000 eval. mean_total 14.014 (PR-F) -> 14.396 (E28) -> 14.684 (templates) -> 15.634 (+1.620 over PR-F). Row-level no_halluc 0.601 -> 1.000 (perfect, 1000/1000). pass_all 11.7% (PR-F) -> 69.1% (~6x PR-F). f1_triggers 9.067 -> 9.897 (977/1000 perfect)."
    metrics:
      mean_total: 15.634
      no_halluc: 1.000
      pass_all_pct: 69.1

  - label: "+ well_formed fix"
    description: "Same E28+v5+templates+No-triggers eval, rescored with decimal-aware sentence splitter. The well_formed rubric was counting decimal periods inside numbers ('£174.64' / '12.38%') as sentence boundaries, inflating sentence counts from 3 to 5 and failing 285 rows on 'Change in usage'/'Change in unit rates' trigger combos. Regex change [.!?]+ -> [.!?]+(?=\\s|$). Pure rubric correction, same completions. mean_total 15.634 -> 15.897 (+0.263). well_formed mean 0.237 -> 0.500 (perfect). pass_all_pct 69.1% -> 97.7% (+28.6 pp, 977/1000 rows). vs PR-F champion (14.014): +1.883 mean_total, ~8.4x pass_all."
    metrics:
      mean_total: 15.897
      no_halluc: 1.000
      pass_all_pct: 97.7

  - label: "+ trigger backfill (gated)"
    description: "Inference-time post-processing: detect Stage-1-predicted triggers absent from the LLM's output and append a templated explanation entry for each. Gated on Stage-1 v5 sigmoid prob >= 0.9 to guard against false positives. Reuses the lonely-trigger renderers; no GPU, no retrain. Pure rescore on the same E28+v5+all per_row dump. Closes 14/23 residual f1<10 failures (all 'metadata trigger dropped when paired with salient trigger' pattern). Remaining 9 failures drop 'Change in usage'/'Change in unit rates' which have no renderer in the lonely-trigger set. mean_total 15.897 -> 15.967 (+0.070). f1_triggers 9.897 -> 9.967. pass_all_pct 97.7% -> 99.1% (+1.4 pp, 991/1000 rows). vs PR-F champion (14.014): +1.953 mean_total, ~8.5x pass_all."
    metrics:
      mean_total: 15.967
      no_halluc: 1.000
      pass_all_pct: 99.1

  - label: "+ usage / unit-rate renderers"
    description: "Add the two missing renderers (_render_change_in_usage / _render_change_in_unit_rates) so the gated backfill can close the residual 9 failures. Renderers cite only valid_facts entries (tariff name, rate_percentages with abs >= 1.0, prev_amount) — no usage % cited (avoids needing extra grounding extraction). Backfill registry split from overwrite registry so LLM prose for these triggers stays untouched on rows where the LLM emits them correctly. Pure rescore on E28+v5+all per_row dump. Closes ALL residual failures: 23 backfill events on 1000 rows, every row passes every gate. mean_total 15.967 -> 16.000 (+0.033, ceiling). f1_triggers 9.967 -> 10.000. pass_all_pct 99.1% -> 100.0% (+0.9 pp, 1000/1000)."
    metrics:
      mean_total: 16.000
      no_halluc: 1.000
      pass_all_pct: 100.0

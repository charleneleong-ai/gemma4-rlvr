# v3 Gemma 4 26B-A4B (MoE) preset — A100 PCIe 80GB.
#
# Step up from v2's `gemma-4-E4B-it` (4B dense) to `gemma-4-26B-A4B-it` —
# 26B total parameters, 4B active per token (Mixture-of-Experts). Decode
# latency stays ~4B-class; capability is 26B-class. Reasoning behind the
# swap in `docs/v3-26b-a4b-migration.md`.
#
# Cumulative changes vs train_v2_80gb:
#   - model_name:    unsloth/gemma-4-E4B-it -> unsloth/gemma-4-26B-A4B-it
#   - load_in_4bit:  false -> true   (26B BF16 = 52 GB; 4-bit = 13 GB + LoRA + KV
#                                     fits comfortably on 80 GB)
#   - lora_rank:     128 -> 256      (more LoRA capacity for the experts' MLPs)
#   - batch_size:    8 -> 4          (per-rollout memory ~2x with 26B forward)
#   - grad_accum:    2 -> 4          (keeps effective grad batch = 16 unchanged)
#   - num_generations: stays 16      (still divides batch_size * grad_accum)
#   - max_seq_length: 8192           (unchanged — full regression-trace coverage)
#
# Step time: expect ~150-200s on PCIe 80GB. Training is ~2-3x slower per step
# than v2 because the 26B base is bigger even with sparse activation, and the
# LoRA-on-experts gradient is over more params. Eval throughput is ~2x slower
# (more weights to forward through). Keep `--max-steps 80` for autoresearch
# iters; full long-runs at 160 will take 5-7 hours.
#
# Inference target: L4 GPU on Cloud Run with INT8 quantization.
#   - 26B INT8 weights ~ 13 GB   - leaves 8-10 GB on L4 for KV + batch=4-8
#   - 26B INT4 (AWQ/GPTQ) ~ 6.5 GB - production option, batch=16+
#
# See docs/v3-26b-a4b-migration.md for the full plan.

defaults:
  - train
  - _self_

train:
  # Model: Gemma 4 26B-A4B MoE (26B total, 4B active/tok)
  model_name: unsloth/gemma-4-26B-A4B-it

  # Memory: 4-bit base is required at 26B even on 80 GB. LoRA gets applied
  # to the experts' MLPs (Unsloth handles MoE LoRA natively).
  load_in_4bit: true
  lora_rank: 256
  max_seq_length: 8192
  max_completion_length: 1024

  # GRPO: keep group size = effective_batch (= 16). Drop batch_size to fit
  # the bigger forward, bump grad_accum to compensate.
  # Constraint: (batch_size * grad_accum) % num_generations == 0
  # 4 * 4 = 16, divisible by num_generations=16. One unique prompt per
  # grad step with 16 rollouts.
  batch_size: 4
  grad_accum: 4
  num_generations: 16

  # Optimizer: keep v2-best defaults until v3 sweep 2 explores
  learning_rate: 1.0e-5
  beta: 0.04
  weight_decay: 0.001

  # Eval: smaller bs because 26B forward is 2x heavier
  eval_batch_size: 16
  eval_heldout_n: 1000
  eval_regression_n: 100

  # Schedule: short autoresearch iter (extend via CLI for full runs)
  max_steps: 80
  warmup_steps: 30
  save_steps: 50
  seed: 42

wandb:
  tags: ["gemma4", "rlvr", "dd-explainer", "26b-a4b", "v3"]

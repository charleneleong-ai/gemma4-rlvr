# Speed-tuned training preset.
#
# Same parallelism as train.yaml (bs=4 * num_gen=4 = 16 sequences) but
# shorter contexts cut the per-step working set by ~33%. Use when your
# prompts fit in 4k tokens and target completions are <= 512.

defaults:
  - train
  - _self_

train:
  max_seq_length: 4096        # 99th-percentile dd_explainer prompt is ~3.5k
  max_completion_length: 512  # reward-shaping caps useful length

  batch_size: 4
  grad_accum: 2               # effective grad-update batch = 8
  num_generations: 4          # GRPO needs ≥4 rollouts/prompt for variance

wandb:
  tags: ["gemma4", "rlvr", "dd-explainer", "e4b", "fast"]

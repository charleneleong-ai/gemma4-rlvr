# Memory-constrained training preset.
#
# Use when the cgroup OOM-kills `train.yaml`. Trades wall-clock for headroom:
# shorter context, half the rollout batch (4 seqs vs 16), 2 generations per
# prompt instead of 4. Effective grad-update batch stays at 8.

defaults:
  - train
  - _self_

train:
  max_seq_length: 4096
  max_completion_length: 512

  batch_size: 2
  grad_accum: 4
  num_generations: 2

  load_in_4bit: true
  use_gradient_checkpointing: unsloth

wandb:
  tags: ["gemma4", "rlvr", "dd-explainer", "e4b", "mem"]

# V2 cap-neg-tails RE-RUN — A100 PCIe 80GB, train_v2_80gb preset.
#
# REVISED FRAMING (after E14 lands):
#
# The original v2_cap_neg_tails sweep was meant to test capping the
# no_halluc fail score from -3 to -1. Two issues compounded the result:
#
#   1. Bug — only the tariff fail path got the cap; line 210 (the percentage
#      fail path) stayed hardcoded at -3.0. So E13/E14 trained on a
#      HALF-capped rubric. Fixed in 59d9ad3, RUBRIC_VERSION bumped to
#      `2026-04-27-cap-neg-tails-v2`.
#
#   2. New finding from E14 — even with HALF capping + long training, the
#      model SHIFTED its rubric profile in a way the mean_total didn't
#      capture:
#
#                          E1 champ    E13 anchor   E14 long-run
#                          (uncapped)  (½-capped)   (½-capped)
#         mean_total       9.611       9.463        8.961
#         f1_triggers      7.45        7.389        6.473  ← traded down
#         no_halluc        -0.328      -0.424       -0.156 ← BEST EVER
#         well_formed      -0.001      -0.01        +0.144 ← matches E10's best
#         pass_all%        24.8%       22.2%        29.9%
#
#      The model traded f1 (recall) for hallucination + structure when
#      penalty pressure on hallucination was reduced. f1 is NOT a fixed
#      ceiling at ~7.5 (as previously claimed in
#      docs/ceiling-diagnosis-2026-04-27.md) — it's a TRADE-OFF VARIABLE,
#      because f1's max=10 dominates the mean_total sum.
#
# What this v2 sweep actually answers — given the trade-off framing:
#
#   * Does FULL capping (both fail paths at -1) push the model further
#     down the f1↓ / no_halluc↑ ridge, or find a flatter equilibrium where
#     both move up?
#   * Anchor expectation: no_halluc closer to +0 (less penalty mass), but
#     f1 likely drops further as the model spends less attention on it.
#     mean_total may go UP (because no_halluc lift) or DOWN (because f1
#     drops more than no_halluc lifts).
#   * Long-run expectation: same pattern, more pronounced.
#
# Decision tree post-sweep:
#
#   * If mean_total > E14's 8.96 AND f1 ≥ 6.5 → full cap is the right
#     setting; pivot to combining with data regen for f1 ceiling lift.
#   * If mean_total < E14 OR f1 < 6 → softer gradient on no_halluc actively
#     hurts; revert to original rubric AND attack via data regen instead.
#   * If pass_all goes UP regardless of mean_total → the rubric softening
#     improved per-rubric quality even when mean_total flatlines; document
#     as a separate ridge worth tuning.
#
# Total runtime: ~3h.

common_overrides:
  - "--eval-batch-size"
  - "32"
  - "--eval-regression-n"
  - "100"
  - "--patience"
  - "8"
  - "--plateau-window"
  - "10"
  - "--plateau-delta"
  - "0.05"

iters:
  # 1. ANCHOR on FULLY-capped rubric — direct comparison vs E13.
  # Hypothesis: model continues the f1↓/no_halluc↑ trade. If pass_all goes
  # up but mean_total goes down, the rubric mass is in the wrong place.
  - config: train_v2_80gb
    overrides:
      - "--learning-rate"
      - "5.0e-6"
    description: "lr=5e-6 + FULLY capped neg tails (anchor on rubric_v2 — vs E13's 9.463)"

  # 2. LONG-RUN on FULLY-capped rubric — direct comparison vs E14.
  # Hypothesis: trade-off intensifies with more steps. f1 may drop below 6;
  # no_halluc may approach 0 or go positive for the first time.
  - config: train_v2_80gb
    overrides:
      - "--learning-rate"
      - "5.0e-6"
      - "--max-steps"
      - "160"
      - "--patience"
      - "15"
      - "--plateau-window"
      - "15"
    description: "lr=5e-6 + max_steps=160 + FULLY capped neg tails (long-run vs E14's 8.96)"

# PR-C: Stage 2 GRPO retrain on the slot-grounded schema.
#
# PR-A added structured `tariff_cited` / `rate_change_pct_cited` slots and
# the prompt template instructing the model to populate them.
# PR-B added LMFE token-mask enforcement at inference time but the n=1000
# verdict was flat (mean_total=10.966 vs PR #12 10.961, no_halluc=-0.724
# vs -0.732) because E18 picks `null` for slots — it was never trained
# to populate them.
#
# This sweep adds `reward_no_hallucinated_facts_slots` to REWARD_FUNCS
# (via --slot-reward-weight) so GRPO gets gradient signal toward
# populating slots with valid values. Bracket weights at ×{1,3} on the
# anchor + a long-run at ×2 to find the sweet spot.
#
# Pattern matches E25 (v4_two_stage_grpo): fresh-from-base + Stage-1
# predictions injected into the prompt. `train.py` doesn't support
# initialising from a saved LoRA, so we always start from the 4B base.
#
# Falsification thresholds (n=100 regression eval):
#   no_halluc(slots) > 0.5  → slots being populated, train more iters
#   no_halluc(prose) ≥ -0.5 → ship as new champion
#   no_halluc(prose) ≥ -0.6 → meaningful lift over PR #12 baseline
#   no_halluc(prose) <= PR-B → slot training didn't help; rethink
#
# Comparison anchors (n=1000):
#   E18 (PR #12 baseline w/ constrain-facts):  mean_total=10.961, no_halluc=-0.732
#   E18 + LMFE slot mask (PR-B):                mean_total=10.966, no_halluc=-0.724
#   E25 (v4_two_stage_grpo, no slot reward):    mean_total=10.804, no_halluc=-0.844
#
# Each iteration ≈ 90 min train + 15 min eval = ~2 h on 80GB A100.
# Total sweep ~6 h.

common_overrides:
  - "--eval-batch-size"
  - "32"
  - "--eval-regression-n"
  - "100"
  - "--patience"
  - "10"
  - "--plateau-window"
  - "10"
  - "--plateau-delta"
  - "0.05"
  - "--no-halluc-mode"
  - "granular"
  - "--no-halluc-weight"
  - "2.0"
  - "--stage1-predictions-path"
  - "/workspace/gemma4_rl/data/stage1_predictions_v3.json"

iters:
  # 1. ANCHOR — slot weight=1.0. Direct comparison vs E25 (10.804/-0.844).
  - config: train_v2_80gb
    overrides:
      - "--learning-rate"
      - "5.0e-6"
      - "--slot-reward-weight"
      - "1.0"
      - "--max-steps"
      - "80"
    description: "anchor: stage1 + slot reward ×1.0 + 80 steps (vs E25 10.804/-0.844)"

  # 2. WEIGHTED — push gradient harder on slot dimension.
  - config: train_v2_80gb
    overrides:
      - "--learning-rate"
      - "5.0e-6"
      - "--slot-reward-weight"
      - "3.0"
      - "--max-steps"
      - "80"
    description: "stage1 + slot reward ×3.0 + 80 steps (bracket on weight axis)"

  # 3. LONG-RUN — middle weight, more steps to let slot population converge.
  - config: train_v2_80gb
    overrides:
      - "--learning-rate"
      - "5.0e-6"
      - "--slot-reward-weight"
      - "2.0"
      - "--max-steps"
      - "160"
      - "--patience"
      - "15"
      - "--plateau-window"
      - "15"
    description: "stage1 + slot reward ×2.0 + 160 steps (long-run middle weight)"

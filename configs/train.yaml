# Default training config — 300-step GRPO on E4B-it with wandb logging.
#
# Memory profile (40 GB A100 + container cgroup):
#   - 4-bit base + Unsloth offloaded gradient checkpointing
#   - per-step rollout = batch_size * num_generations = 16 sequences
#   - peak completion = 768 tokens
# Effective batch (for grad updates) = batch_size * grad_accum = 8.

train:
  model_name: unsloth/gemma-4-E4B-it
  data_dir: /workspace/gemma4_rl/data
  save_path: gemma_4_lora
  output_dir: outputs

  max_seq_length: 6144
  max_completion_length: 768       # was 1024 — long-tail rollouts caused OOM peaks

  batch_size: 4                    # was 8 — halve rollout batch to fit cgroup
  grad_accum: 2                    # keep effective batch = 8
  num_generations: 4

  learning_rate: 1.0e-5
  beta: 0.04
  weight_decay: 0.001

  lora_rank: 64

  # Memory-efficient defaults (override via CLI or train_mem.yaml).
  load_in_4bit: true
  use_gradient_checkpointing: unsloth

  max_steps: 300
  warmup_steps: 30
  save_steps: 50
  seed: 42

  patience: 0             # 0 disables early stopping
  plateau_window: 10
  plateau_delta: 0.05

wandb:
  # Project / entity fall back to env (.env or shell), with sensible defaults.
  # `mode` is pinned per-YAML so smoke runs can force `disabled` even when
  # WANDB_API_KEY is set.
  project: ${oc.env:WANDB_PROJECT, "gemma4-rlvr"}
  entity: ${oc.env:WANDB_ENTITY, "chaleong"}
  mode: online
  tags: ["gemma4", "rlvr", "dd-explainer", "e4b"]

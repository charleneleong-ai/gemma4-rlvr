# mise tasks for the gemma4-rlvr project.
# Install mise: https://mise.jdx.dev/getting-started.html
# List tasks:   mise tasks
# Run a task:   mise run <name>  (or  mise run smoke)

[tools]
python = "3.12"
uv = "latest"

# ── Environment setup ────────────────────────────────────────────────

[tasks.init]
description = "First-time bootstrap: create .venv via stdlib + install all deps + register pre-commit hooks"
run = """
set -e
[ -d .venv ] && rm -rf .venv
python3.12 -m venv .venv
uv sync --extra dev
uv run pre-commit install --install-hooks
echo ""
uv run python -c "import torch, transformers, trl, unsloth; print('✓ deps OK'); print(f'transformers {transformers.__version__} | torch {torch.__version__} | cuda={torch.cuda.is_available()}')"
echo "✓ pre-commit hooks registered (file hygiene only — `mise run lint` for ruff)"
"""

[tasks.sync]
description = "Refresh deps from pyproject.toml without recreating the venv"
run = "uv sync --extra dev"

[tasks.lint]
description = "Run ruff with autofix on the maintained source files."
run = "uv run ruff check --fix ."

[tasks."pre-commit"]
description = "Run all pre-commit hooks (file hygiene). Pass --all-files for full tree."
run = "uv run pre-commit run"

# ── Training ─────────────────────────────────────────────────────────

[tasks.smoke]
description = "Quick 2-step v2 train (detached, no eval, wandb disabled). Verifies env + GPU. Survives ssh/cc death."
run = """
mkdir -p logs
LOG=logs/smoke_$(date -u +%Y%m%dT%H%M%SZ).log
echo "log: $LOG"
WANDB_MODE=disabled setsid nohup uv run python -u train.py train \
  -c train_v2_80gb -d "[v2 smoke] env verification" \
  --max-steps 2 --eval-heldout-n 0 --eval-regression-n 0 \
  --completion-preview-every 0 \
  > "$LOG" 2>&1 < /dev/null &
disown
echo "PID:    $!  (detached — survives ssh death)"
echo "follow: tail -F $LOG"
"""

[tasks.sweep]
description = "Launch an autoresearch sweep with a named schedule. Pass the schedule name as the first arg (default: v2_baseline). Available: configs/schedules/*.yaml."
run = """
SCHED="${1:-v2_baseline}"
SCHED_FILE="configs/schedules/${SCHED}.yaml"
if [ ! -f "$SCHED_FILE" ]; then
  echo "schedule not found: $SCHED_FILE"
  echo "available:"
  ls configs/schedules/*.yaml 2>/dev/null | sed 's|configs/schedules/||;s|.yaml$||' | sed 's/^/  /'
  exit 1
fi
mkdir -p logs
LOG=logs/sweep_${SCHED}_$(date -u +%Y%m%dT%H%M%SZ).log
echo "schedule: $SCHED"
echo "log:      $LOG"
setsid nohup uv run python -u experiments/autoresearch.py \
  --schedule "$SCHED" > "$LOG" 2>&1 < /dev/null &
disown
echo "PID:      $!  (detached — survives session death)"
echo ""
echo "follow:   tail -F $LOG"
"""

[tasks.train]
description = "Single train run with the default config. Pass overrides after --, e.g. mise run train -- --learning-rate 5e-6"
run = "uv run python -u train.py train -c train_v2_80gb"

# ── Data ─────────────────────────────────────────────────────────────

[tasks.data]
description = "Regenerate the 5500-row synthetic dataset (one-off, ~20s)."
run = "uv run python dd_explainer_data_generator.py -n 5500"

# ── Observability ────────────────────────────────────────────────────

[tasks.gpu]
description = "nvitop — interactive GPU monitor (q to quit)."
run = "nvitop"

[tasks."gpu-snap"]
description = "One-shot GPU snapshot (memory + util)."
run = "nvidia-smi --query-gpu=name,memory.used,memory.free,utilization.gpu --format=csv,noheader"

[tasks.chart]
description = "Regenerate progress.html for a config (default: train_v2_80gb). Pass config name as arg."
run = """
CFG="${1:-train_v2_80gb}"
uv run python -c "from experiments.experiment_progress import plot_progress; plot_progress(\\"dd_explainer\\", config_name=\\"$CFG\\")"
"""

[tasks.serve]
description = "Serve experiments/ over HTTP for viewing progress.html. Default port 8080. Use vast.ai port-forward or SSH `-L 8080:localhost:8080`."
run = """
PORT="${1:-8080}"
echo "→ http://localhost:$PORT/dd_explainer/<config_name>/progress.html"
echo "→ e.g.   http://localhost:$PORT/dd_explainer/train_v2_80gb/progress.html"
echo ""
cd experiments && .venv/../uv run python -m http.server "$PORT" --bind 0.0.0.0
"""

[tasks.tail]
description = "Follow the most recent autoresearch / smoke log (interactive — Ctrl-C to detach)."
run = """
LOG=$(ls -t logs/*.log 2>/dev/null | head -1)
[ -z "$LOG" ] && { echo "no logs in logs/"; exit 1; }
echo "tailing $LOG"
tail -F "$LOG"
"""

[tasks.ps]
description = "Show all detached training / sweep daemons currently running. Useful after reconnecting."
run = """
echo "=== training / autoresearch processes ==="
ps -ef | grep -E "(train\\.py train|experiments/autoresearch\\.py)" | grep -v grep || echo "(none running)"
echo ""
echo "=== GPU ==="
nvidia-smi --query-gpu=memory.used,memory.free,utilization.gpu --format=csv,noheader
"""

[tasks.logs]
description = "List recent log files with size + last-modified, newest first. For picking up where you left off."
run = """
ls -lht logs/ 2>/dev/null | head -10 || echo "(no logs/ directory)"
"""

# ── autoresearch package wrappers (pkg-CLI replaces in-project scripts) ──
# These call the `autoresearch-*` CLIs from the autoresearch package
# (pyproject dep). Same behaviour as `experiments/_pr_updater.py` etc., but
# project-agnostic. Once these are validated in production, the in-project
# scripts can be deleted.

[tasks."pkg-pr-updater"]
description = "Launch the package-based PR refresher daemon. Pass --config (default train_v2_80gb)."
run = """
CFG="${1:-train_v2_80gb}"
mkdir -p logs
LOG=logs/pkg_pr_updater_${CFG}_$(date -u +%Y%m%dT%H%M%SZ).log
echo "log: $LOG"
# --png-path overrides the package's default (which would land in the
# gitignored experiments/dd_explainer/<config>/progress.png) to land at
# the committable experiments/progress/<config>/progress.png — this
# project's convention.
PR="${PR_NUMBER:-6}"
setsid nohup uv run autoresearch-pr-updater \
  --tag dd_explainer --config "$CFG" \
  --pr "$PR" --repo charleneleong-ai/gemma4-rlvr \
  --branch chore/import-autoresearch-pkg \
  --cwd /workspace/gemma4_rl \
  --png-path /workspace/gemma4_rl/experiments/progress/${CFG}/progress.png \
  > "$LOG" 2>&1 < /dev/null &
echo "PID: $!  (detached)"
"""

[tasks."pkg-current-run"]
description = "Launch the package-based in-flight RUNNING-dot daemon. Pass --config."
run = """
CFG="${1:-train_v2_80gb}"
mkdir -p logs
LOG=logs/pkg_current_run_${CFG}_$(date -u +%Y%m%dT%H%M%SZ).log
echo "log: $LOG"
setsid nohup uv run autoresearch-current-run \
  --tag dd_explainer --config "$CFG" \
  --logs-dir /workspace/gemma4_rl/logs \
  --experiments-dir /workspace/gemma4_rl/experiments \
  > "$LOG" 2>&1 < /dev/null & disown
echo "PID: $!  (detached)"
"""

[tasks."pkg-render"]
description = "One-shot render of the progress PNG using the package renderer."
run = """
CFG="${1:-train_v2_80gb}"
uv run autoresearch-render \
  --experiments-dir /workspace/gemma4_rl/experiments \
  --tag dd_explainer --config "$CFG" \
  --out /workspace/gemma4_rl/experiments/progress/${CFG}/progress.png
"""

# ── Maintenance ──────────────────────────────────────────────────────

[tasks."kill-train"]
description = "SIGTERM any running train.py — clean shutdown that logs CRASH row."
run = """
PIDS=$(pgrep -f "train.py train" || true)
[ -z "$PIDS" ] && { echo "no train.py running"; exit 0; }
echo "SIGTERM to: $PIDS"
kill -TERM $PIDS
"""

[tasks.clean]
description = "Remove generated artifacts (logs, wandb, __pycache__). Does NOT touch .venv or data."
run = """
rm -rf logs/*.log
rm -rf wandb/run-* wandb/latest-run
find . -type d -name __pycache__ -prune -exec rm -rf {} +
echo "cleaned"
"""
